<style>

    --mustard:#F2A93B; --grill-green:#3F7A55; --muted:#8E8B84;
  }
  html{background:var(--steel);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--steel);color:var(--cream);font-family:'Inter',sans-serif;min-height:100vh;}
  .checker{
    height:6px;width:100%;
    background-image:linear-gradient(45deg, var(--ink) 25%, transparent 25%),linear-gradient(-45deg, var(--ink) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, var(--ink) 75%),linear-gradient(-45deg, transparent 75%, var(--ink) 75%);
    background-size:12px 12px;background-color:var(--cream);
    background-position:0 0, 0 6px, 6px -6px, -6px 0;
  }
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--steel-line);}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .brand small{color:var(--mustard);font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:600;}
  .brand strong{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;}
  .warn{font-size:11px;color:var(--muted);}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 100px;background:var(--steel);}
  h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--mustard);margin:26px 0 12px;display:flex;align-items:center;gap:10px;}
  h2::after{content:'';flex:1;height:1px;background:var(--steel-line);}
  .card{background:var(--cream);color:var(--ink);border-radius:10px;padding:16px;margin-bottom:14px;}
  .field{margin-bottom:12px;}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:#7a6c46;}
  .field input, .field textarea{
    width:100%;margin-top:5px;padding:9px;border-radius:6px;border:1px solid #cbbd94;
    background:#fff;font-family:'Inter',sans-serif;font-size:14px;
  }
  .cat-card{background:#343330;border:1px solid var(--steel-line);border-radius:10px;padding:14px;margin-bottom:16px;}
  .cat-title-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
  .cat-title-row input{
    flex:1;padding:9px;border-radius:6px;border:1px solid var(--steel-line);background:var(--steel);
    color:var(--cream);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.5px;
  }
  .icon-btn{
    padding:8px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;
    text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;
  }
  .icon-btn.del{background:#5c2b28;color:#ffb4ac;}
  .dish-row{
    display:grid;grid-template-columns:auto 1.3fr 1.6fr 80px auto auto auto auto auto;gap:8px;align-items:center;
    background:var(--cream);border-radius:8px;padding:8px;margin-bottom:8px;cursor:grab;
  }
  .dish-row.dragging{opacity:0.35;}
  .drag-handle{cursor:grab;font-size:16px;color:#8a7a52;padding:0 2px;user-select:none;}
  .cat-drag-handle{font-size:20px;color:var(--mustard);padding:0 6px;}
  .drag-hint{font-size:11px;color:#8a7a52;margin-bottom:10px;font-style:italic;}
  .cat-card{transition:background 0.15s, box-shadow 0.15s;}
  .cat-card.drag-over{background:#4a4638;box-shadow:0 0 0 2px var(--mustard) inset;}
  @media(max-width:640px){ .dish-row{grid-template-columns:1fr 1fr;} }
  .dish-row input[type="text"], .dish-row input[type="number"]{
    padding:8px;border-radius:6px;border:1px solid #cbbd94;background:#fff;color:var(--ink);font-size:13px;
  }
  .move-btns{display:flex;flex-direction:column;gap:2px;}
  .move-btns button{
    width:24px;height:18px;border:1px solid #cbbd94;background:#fff;border-radius:4px;
    cursor:pointer;font-size:10px;color:#6b5d38;line-height:1;padding:0;
  }
  .move-btns button:disabled{opacity:0.3;cursor:default;}
  .cat-move-btns{display:flex;gap:4px;}
  .cat-move-btns button{
    width:30px;height:30px;border:1px solid var(--steel-line);background:var(--steel);color:var(--cream);
    border-radius:6px;cursor:pointer;font-size:12px;
  }
  .cat-move-btns button:disabled{opacity:0.3;cursor:default;}
  .icon-btn.opts{background:#4a4238;color:var(--mustard);}
  .icon-btn.opts.active{background:var(--mustard);color:var(--ink);}
  .options-panel{
    background:#3d3a34;border:1px dashed var(--chrome);border-radius:8px;
    padding:12px;margin:-2px 0 10px;
  }
  .option-group-card{background:var(--cream);border-radius:8px;padding:10px;margin-bottom:10px;color:var(--ink);}
  .option-group-top{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .option-group-top input[type="text"]{flex:1;padding:7px;border-radius:6px;border:1px solid #cbbd94;font-size:13px;}
  .option-group-top select{padding:7px;border-radius:6px;border:1px solid #cbbd94;font-size:12px;}
  .option-group-top input[type="number"]{width:56px;padding:7px;border-radius:6px;border:1px solid #cbbd94;font-size:13px;}
  .option-group-card textarea{
    width:100%;margin-top:4px;padding:8px;border-radius:6px;border:1px solid #cbbd94;font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .option-group-card label{font-size:11px;color:#7a6c46;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
  .add-group-btn{
    width:100%;padding:9px;border-radius:6px;border:1px dashed var(--mustard);background:transparent;
    color:var(--mustard);font-size:12px;font-weight:700;cursor:pointer;
  }
  .sold-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b5d38;white-space:nowrap;}
  .add-dish-btn{
    width:100%;padding:9px;border-radius:6px;border:1px dashed var(--chrome);background:transparent;
    color:var(--chrome);font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;
  }
  .add-cat-btn{
    width:100%;padding:12px;border-radius:8px;border:1px dashed var(--mustard);background:transparent;
    color:var(--mustard);font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;
  }
  .save-bar{
    position:fixed;left:0;right:0;bottom:0;background:var(--steel);border-top:1px solid var(--steel-line);
    padding:12px 20px;display:flex;justify-content:flex-end;align-items:center;gap:12px;z-index:20;
  }
  .save-btn{
    padding:12px 24px;border:none;border-radius:8px;background:var(--diner-red);color:#fff;
    font-weight:700;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;
  }
  .saved-note{font-size:12px;color:var(--grill-green);font-weight:700;opacity:0;transition:opacity .2s;}
  .saved-note.show{opacity:1;}
</style>

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let state = { siteInfo: {...DEFAULT_SITE, contact:{...DEFAULT_SITE.contact}}, seo: {...DEFAULT_SEO}, menu: JSON.parse(JSON.stringify(DEFAULT_MENU)), printStations: [] };
let openOptionsFor = {};
let openRoutingFor = {};

function uid(){ return 'd_' + Date.now() + '_' + Math.floor(Math.random()*10000); }
function gid(){ return 'og_' + Date.now() + '_' + Math.floor(Math.random()*10000); }
function sid(){ return 'st_' + Date.now() + '_' + Math.floor(Math.random()*10000); }

function ensureOptionGroups(menu){
  menu.forEach(sec=>{
    if(!sec.orderWindow) sec.orderWindow = { enabled:false, start:'11:00', end:'15:00' };
    sec.items.forEach(it=>{
      if(!Array.isArray(it.optionGroups)) it.optionGroups = [];
      if(!Array.isArray(it.printRouting)) it.printRouting = [];
    });
  });
  return menu;
}

async function loadConfig(){
  try{
    const res = await fetch('/api/config');
    if(res.ok){
      const cfg = await res.json();
      if(cfg.siteInfo){
        state.siteInfo = {
          contact:{phone:'',address:'',hours:''},
          orderingHours: JSON.parse(JSON.stringify(DEFAULT_SITE.orderingHours)),
          ...cfg.siteInfo
        };
        if(cfg.siteInfo.orderingHours){
          state.siteInfo.orderingHours = {
            timezone: cfg.siteInfo.orderingHours.timezone || 'America/New_York',
            schedule: { ...DEFAULT_SITE.orderingHours.schedule, ...(cfg.siteInfo.orderingHours.schedule||{}) }
          };
        }
      }
      if(cfg.seo) state.seo = cfg.seo;
      if(cfg.menu && cfg.menu.length) state.menu = ensureOptionGroups(cfg.menu);
      if(Array.isArray(cfg.printStations)) state.printStations = cfg.printStations;
    }
  }catch(e){}
  renderSite();
  renderSeo();
  renderHours();
  renderStations();
  renderCredentials();
  renderMenu();
}

let dragSource = null;
let catDragSource = null;

function bindMenuEvents(){
  document.querySelectorAll('.dish-row[draggable]').forEach(row=>{
    row.addEventListener('dragstart', (e)=>{
      dragSource = { ci: Number(row.dataset.ci), di: Number(row.dataset.di) };
      row.classList.add('dragging');
      if(e.dataTransfer){
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', row.dataset.ci + ':' + row.dataset.di);
      }
    });
    row.addEventListener('dragend', ()=>{
      row.classList.remove('dragging');
      document.querySelectorAll('.cat-card.drag-over').forEach(c=>c.classList.remove('drag-over'));
      dragSource = null;
    });
  });

  document.querySelectorAll('.cat-drag-handle').forEach(handle=>{
    handle.addEventListener('dragstart', (e)=>{
      catDragSource = Number(handle.dataset.ci);
      if(e.dataTransfer){
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', 'cat:' + catDragSource);
      }
    });
    handle.addEventListener('dragend', ()=>{
      document.querySelectorAll('.cat-card.drag-over').forEach(c=>c.classList.remove('drag-over'));
      catDragSource = null;
    });
  });

  document.querySelectorAll('.cat-card').forEach(card=>{
    card.addEventListener('dragover', (e)=>{
      if(!dragSource && catDragSource === null) return;
      e.preventDefault();
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', (e)=>{
      if(e.target === card) card.classList.remove('drag-over');
    });
    card.addEventListener('drop', (e)=>{
      e.preventDefault();
      card.classList.remove('drag-over');
      const targetCi = Number(card.dataset.catIndex);
      if(dragSource){
        if(targetCi === dragSource.ci){ dragSource = null; return; }
        const [movedItem] = state.menu[dragSource.ci].items.splice(dragSource.di, 1);
        state.menu[targetCi].items.push(movedItem);
        dragSource = null;
        renderMenu();
      } else if(catDragSource !== null){
        if(targetCi === catDragSource){ catDragSource = null; return; }
        const [movedCat] = state.menu.splice(catDragSource, 1);
        let insertAt = targetCi;
        if(catDragSource < targetCi) insertAt -= 1;
        state.menu.splice(insertAt, 0, movedCat);
        catDragSource = null;
        renderMenu();
      }
    });
  });

  document.querySelectorAll('.cat-window-enabled').forEach(cb=>{
    cb.onchange = ()=>{
      const ci = cb.dataset.ci;
      if(!state.menu[ci].orderWindow) state.menu[ci].orderWindow = { enabled:false, start:'11:00', end:'15:00' };
      state.menu[ci].orderWindow.enabled = cb.checked;
      renderMenu();
    };
  });
  document.querySelectorAll('.cat-window-start').forEach(inp=>{
    inp.onchange = ()=>{ state.menu[inp.dataset.ci].orderWindow.start = inp.value; };
  });
  document.querySelectorAll('.cat-window-end').forEach(inp=>{
    inp.onchange = ()=>{ state.menu[inp.dataset.ci].orderWindow.end = inp.value; };
  });
  document.querySelectorAll('.cat-name').forEach(inp=>{
    inp.oninput = ()=>{ state.menu[inp.dataset.ci].cat = inp.value; };
  });
  document.querySelectorAll('.dish-row input[type="text"], .dish-row input[type="number"]').forEach(inp=>{
    inp.oninput = ()=>{
      const ci = inp.dataset.ci, di = inp.dataset.di, field = inp.dataset.field;
      const val = field==='price' ? Number(inp.value)||0 : inp.value;
      state.menu[ci].items[di][field] = val;
    };
  });
  document.querySelectorAll('.dish-row input[type="checkbox"]').forEach(inp=>{
    inp.onchange = ()=>{
      const ci = inp.dataset.ci, di = inp.dataset.di, field = inp.dataset.field;
      state.menu[ci].items[di][field] = inp.checked;
    };
  });
  document.querySelectorAll('[data-act="delDish"]').forEach(btn=>{
    btn.onclick = ()=>{
      state.menu[btn.dataset.ci].items.splice(btn.dataset.di,1);
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="moveCatUp"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = Number(btn.dataset.ci);
      if(ci<=0) return;
      [state.menu[ci-1], state.menu[ci]] = [state.menu[ci], state.menu[ci-1]];
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="moveCatDown"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = Number(btn.dataset.ci);
      if(ci>=state.menu.length-1) return;
      [state.menu[ci+1], state.menu[ci]] = [state.menu[ci], state.menu[ci+1]];
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="moveDishUp"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = Number(btn.dataset.ci), di = Number(btn.dataset.di);
      const items = state.menu[ci].items;
      if(di<=0) return;
      [items[di-1], items[di]] = [items[di], items[di-1]];
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="moveDishDown"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = Number(btn.dataset.ci), di = Number(btn.dataset.di);
      const items = state.menu[ci].items;
      if(di>=items.length-1) return;
      [items[di+1], items[di]] = [items[di], items[di+1]];
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="addDish"]').forEach(btn=>{
    btn.onclick = ()=>{
      state.menu[btn.dataset.ci].items.push({id:uid(), name:'New Dish', desc:'', price:0, soldOut:false, hot:false, optionGroups:[], printRouting:[]});
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="delCat"]').forEach(btn=>{
    btn.onclick = ()=>{
      if(state.menu.length<=1){ alert('Keep at least one category.'); return; }
      state.menu.splice(btn.dataset.ci,1);
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="toggleOpts"]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.dishid;
      openOptionsFor[id] = !openOptionsFor[id];
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="toggleRouting"]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.dishid;
      openRoutingFor[id] = !openRoutingFor[id];
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="addRoute"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = btn.dataset.ci, di = btn.dataset.di;
      const item = state.menu[ci].items[di];
      if(!Array.isArray(item.printRouting)) item.printRouting = [];
      const defaultStation = (state.printStations||[])[0];
      item.printRouting.push({ station: defaultStation ? defaultStation.name : '', label: '' });
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="delRoute"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = btn.dataset.ci, di = btn.dataset.di, ri = btn.dataset.ri;
      state.menu[ci].items[di].printRouting.splice(ri,1);
      renderMenu();
    };
  });
  document.querySelectorAll('.route-station').forEach(sel=>{
    sel.onchange = ()=>{
      const {ci,di,ri} = sel.dataset;
      state.menu[ci].items[di].printRouting[ri].station = sel.value;
    };
  });
  document.querySelectorAll('.route-label').forEach(inp=>{
    inp.oninput = ()=>{
      const {ci,di,ri} = inp.dataset;
      state.menu[ci].items[di].printRouting[ri].label = inp.value;
    };
  });
  document.querySelectorAll('[data-act="addGroup"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = btn.dataset.ci, di = btn.dataset.di;
      const item = state.menu[ci].items[di];
      if(!Array.isArray(item.optionGroups)) item.optionGroups = [];
      item.optionGroups.push({ id: gid(), label:'Choose your side', type:'single', count:1, choices:['Miso Soup','Salad'] });
      renderMenu();
    };
  });
  document.querySelectorAll('[data-act="delGroup"]').forEach(btn=>{
    btn.onclick = ()=>{
      const ci = btn.dataset.ci, di = btn.dataset.di, gi = btn.dataset.gi;
      state.menu[ci].items[di].optionGroups.splice(gi,1);
      renderMenu();
    };
  });
  document.querySelectorAll('.og-label').forEach(inp=>{
    inp.oninput = ()=>{
      const {ci,di,gi} = inp.dataset;
      state.menu[ci].items[di].optionGroups[gi].label = inp.value;
    };
  });
  document.querySelectorAll('.og-type').forEach(sel=>{
    sel.onchange = ()=>{
      const {ci,di,gi} = sel.dataset;
      state.menu[ci].items[di].optionGroups[gi].type = sel.value;
      renderMenu();
    };
  });
  document.querySelectorAll('.og-count').forEach(inp=>{
    inp.oninput = ()=>{
      const {ci,di,gi} = inp.dataset;
      state.menu[ci].items[di].optionGroups[gi].count = Math.max(1, Number(inp.value)||1);
    };
  });
  document.querySelectorAll('.og-choices').forEach(ta=>{
    ta.oninput = ()=>{
      const {ci,di,gi} = ta.dataset;
      state.menu[ci].items[di].optionGroups[gi].choices = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    };
  });
}

document.getElementById('loadFullMenuBtn').onclick = ()=>{
  if(!confirm('This will REPLACE your entire current menu with the full 174-item default menu. This cannot be undone once you click Save Changes. Continue?')) return;
  state.menu = ensureOptionGroups(JSON.parse(JSON.stringify(DEFAULT_MENU)));
  renderMenu();
  alert('Full menu loaded. Review it below, then click "Save Changes" at the bottom to make it live.');
};
document.getElementById('addCatBtn').onclick = ()=>{
  state.menu.push({cat:'New Category', items:[], orderWindow:{enabled:false, start:'11:00', end:'15:00'}});
  renderMenu();
};

document.getElementById('saveBtn').onclick = async ()=>{
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try{
    const res = await fetch('/api/config', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(state)
    });
    if(!res.ok) throw new Error('save failed');
    const note = document.getElementById('savedNote');
    note.classList.add('show');
    setTimeout(()=>note.classList.remove('show'), 2000);
  }catch(e){
    alert('Save failed — please try again.');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = 'Save Changes';
};

loadConfig();
</script>
</body>
</html>
